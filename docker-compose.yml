services:
  postgres-odoo-base-15-01:
    container_name: postgres_odoo-base-15-01
    image: postgres:10-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /data/postgres
    volumes:
      - postgres_data:/data/postgres
    ports:
      - "5431:5432"

volumes:
  postgres_data: